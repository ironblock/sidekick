name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Test (Linux) + macOS cross-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test (platform-neutral surface)
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cross-check macOS-only code compiles
        run: cargo check --workspace --target aarch64-apple-darwin --features sidekick-embed/coreml

  macos:
    name: Build + test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # macos-latest is macos-26-arm64 (Xcode 26), so the real Foundation
      # Models Swift shim compiles here — sidekick-fm's build.rs hard-errors
      # if it can't, so a green build proves the shim built. Runtime FM calls
      # still can't run in CI (no Apple Intelligence on runner VMs); the
      # hardware gates are `smoke-test` and `ane_check`, run on real Macs.
      - name: Test with all features (Core ML + real FM shim + C ABI)
        run: cargo test --workspace --all-features
      - name: Prove the real FM shim is linked, not the stub
        run: |
          cargo build --release -p sidekick-server --features coreml
          otool -L target/release/sidekickd | grep -q FoundationModels
