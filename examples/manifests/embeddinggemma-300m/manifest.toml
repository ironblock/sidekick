# EmbeddingGemma-300m as ANE-resident Core ML artifacts: one static-shape
# model per sequence-length bucket ({seq} resolves against `buckets`), with
# mask-aware mean pooling, the model's two dense projections (768->3072->768),
# and L2 normalization all baked into the graph (output `embeddings`,
# statically (1, 768)).
#
# Produce the artifacts with tools/convert_embeddinggemma.py. See
# docs/DECISIONS.md D15 for why per-bucket static shapes and in-model
# pooling are required — flexible shapes and raw hidden-state outputs
# silently push the encoder off the ANE.
#
# Note the size tradeoff: ~600 MB per bucket artifact (300m params, fp16
# weights duplicated per bucket). Weight-sharing via multifunction
# mlprograms is a possible future optimization.

id = "embeddinggemma-300m"
backend = "coreml"
artifact = "model_{seq}.mlmodelc"
tokenizer = "tokenizer.json"
dims = 768
matryoshka = [768, 512, 256, 128]
pooling = "none"          # mean pooling + dense stack live inside the model
buckets = [128, 256, 512]
max_seq_len = 512

[io]
input_ids = "input_ids"
attention_mask = "attention_mask"
output = "embeddings"

# EmbeddingGemma requires task prefixes; applied server-side per input_type.
[prefixes]
query = "task: search result | query: "
document = "title: none | text: "
