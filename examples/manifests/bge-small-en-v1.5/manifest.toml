# bge-small-en-v1.5 as a Core ML encoder (last_hidden_state output),
# CLS-pooled by sidekick. Smaller/faster than EmbeddingGemma, English-only.

id = "bge-small-en-v1.5"
backend = "coreml"
artifact = "model.mlmodelc"
tokenizer = "tokenizer.json"
dims = 384
pooling = "cls"           # bge models use the CLS token
buckets = [128, 256, 512]
max_seq_len = 512

[io]
input_ids = "input_ids"
attention_mask = "attention_mask"
output = "last_hidden_state"

[prefixes]
query = "Represent this sentence for searching relevant passages: "
document = ""
